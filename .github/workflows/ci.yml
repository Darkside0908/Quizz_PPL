name: CI/CD UI Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Posisinya sudah sejajar di bawah 'on:'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: quiz_pengupil
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.0'
        extensions: mysqli

    - name: Import Database
      run: |
        # Nama file diubah dari db.sql menjadi quiz_pengupil.sql
        mysql -h 127.0.0.1 -u root quiz_pengupil < quiz_pengupil.sql

    - name: Start PHP Built-in Server
      run: |
        php -S localhost:8000 &
        sleep 3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Selenium Tests
      run: |
        pytest tests/test_ui.py -v